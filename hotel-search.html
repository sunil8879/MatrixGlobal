<!DOCTYPE html>
<html>
<head>
    <title>Hotel Search</title>
</head>
<body>
    <h1>Stay Search</h1>
    <input type="text" id="hotelInput" placeholder="Enter city (e.g. London)">
    <button onclick="runHotelSearch()">Search Hotels</button>
    <div id="hotelResults">Results will appear here...</div>

    <script>
        async function runHotelSearch() {
            const query = document.getElementById('hotelInput').value;
            const div = document.getElementById('hotelResults');
            div.innerText = "Searching...";
            
            const KEY = "4d77880947mshfba562934f7f319p16c3fdjsn0d9c236a6a91"; // PUT YOUR KEY HERE
            
            try {
                const response = await fetch(`https://booking-com15.p.rapidapi.com/api/v1/hotels/searchDestination?query=${query}`, {
                    headers: { 'X-RapidAPI-Key': KEY, 'X-RapidAPI-Host': 'booking-com15.p.rapidapi.com' }
                });
                const data = await response.json();
                div.innerText = JSON.stringify(data, null, 2);
            } catch (err) {
                div.innerText = "Error: " + err.message;
            }
        }
    </script>
</body>
</html>
