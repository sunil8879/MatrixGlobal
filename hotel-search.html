<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Hotel Search</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    padding: 20px;
}

input, button {
    padding: 10px;
    margin: 5px;
}

.card {
    border: 2px solid #4caf50;
    margin: 10px auto;
    width: 85%;
    padding: 12px;
    border-radius: 10px;
    text-align: left;
}
</style>
</head>

<body>

<h1>🏨 Hotel Details</h1>

<input type="text" id="query" placeholder="Enter city (e.g. Pattaya)">
<input type="date" id="date">
<button onclick="searchHotels()">Search</button>

<div id="results"></div>

<script>

async function searchHotels() {

    const query = document.getElementById("query").value;
    const date = document.getElementById("date").value;
    const div = document.getElementById("results");

    div.innerHTML = "Searching...";

    const url =
    `https://travel-advisor.p.rapidapi.com/locations/search?query=${query}&limit=30&offset=0&units=km&location_id=1&currency=USD&sort=relevance&lang=en_US`;

    try {

        const response = await fetch(url, {
            method: "GET",
            headers: {
                "X-RapidAPI-Key": "4d77880947mshfba562934f7f319p16c3fdjsn0d9c236a6a91",
                "X-RapidAPI-Host": "travel-advisor.p.rapidapi.com"
            }
        });

        if (!response.ok) throw new Error("API error " + response.status);

        const data = await response.json();

        const hotels = data?.data || [];

        if (!hotels.length) {
            div.innerHTML = "No hotels found";
            return;
        }

        let html = "<h2>Hotel Results</h2>";

        hotels.forEach((h, i) => {

            html += `
            <div class="card">
                <p><strong>Name of Hotel:</strong> ${h.name || "N/A"}</p>
                <p><strong>Location:</strong> ${h.location_string || query}</p>
                <p><strong>Room Type:</strong> Standard / Deluxe (API not provided)</p>
                <p><strong>Cost:</strong> $ --- (depends on provider)</p>
                <p><strong>Amenities:</strong> Not fully available from API</p>
                <p><strong>Date of Arrival:</strong> ${date || "N/A"}</p>
            </div>
            `;
        });

        div.innerHTML = html;

    } catch (err) {
        console.error(err);
        div.innerHTML = "Error fetching hotel data.";
    }
}

</script>

</body>
</html>
