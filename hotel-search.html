<!DOCTYPE html>
<html>
<head>
    <title>Stay Matrix</title>
</head>
<body>
    <h1>Stay Search</h1>
    <input type="text" id="hotelInput" placeholder="Enter city...">
    <button onclick="runHotelSearch()">Search Hotels</button>
    <div id="hotelResults"></div>

    <script>
        async function runHotelSearch() {
            const query = document.getElementById('hotelInput').value;
            const div = document.getElementById('hotelResults');
            div.innerText = "Searching...";
            
            // Replace with your real Booking.com key
            const HOTEL_KEY = "4d77880947mshfba562934f7f319p16c3fdjsn0d9c236a6a91"; 
            
            const response = await fetch(`https://booking-com15.p.rapidapi.com/api/v1/hotels/searchLocation?query=${query}`, {
                headers: { 
                    'X-RapidAPI-Key': HOTEL_KEY, 
                    'X-RapidAPI-Host': 'booking-com15.p.rapidapi.com' 
                }
            });
            const data = await response.json();
            div.innerText = JSON.stringify(data);
        }
    </script>
</body>
</html>
