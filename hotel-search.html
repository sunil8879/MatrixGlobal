<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stay Search</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; text-align: center; }
        .card { border: 2px solid turquoise; margin: 10px auto; padding: 15px; width: 80%; border-radius: 10px; text-align: left; }
    </style>
</head>
<body>
    <h1>Stay Search</h1>
    <input type="text" id="hotelInput" placeholder="Enter city name...">
    <button onclick="runHotelSearch()">Search Hotels</button>
    <div id="hotelResults"></div>

    <script>
async function runHotelSearch() {
    const city = document.getElementById('hotelInput').value;
    const div = document.getElementById('hotelResults');
    const KEY = "YOUR_BOOKING_KEY";
    
    try {
        const locRes = await fetch(`https://booking-com15.p.rapidapi.com/api/v1/hotels/searchDestination?query=${city}`, {
            headers: { 'X-RapidAPI-Key': KEY, 'X-RapidAPI-Host': 'booking-com15.p.rapidapi.com' }
        });
        const locData = await locRes.json();
        const dest_id = locData[0].dest_id; 

        const res = await fetch(`https://booking-com15.p.rapidapi.com/api/v1/hotels/searchHotels?dest_id=${dest_id}&search_type=CITY`, {
            headers: { 'X-RapidAPI-Key': KEY, 'X-RapidAPI-Host': 'booking-com15.p.rapidapi.com' }
        });
        const hotelData = await res.json();

        // This path matches the structure where hotels is directly under data
        let html = "<h3>Top Hotels:</h3>";
        hotelData.data.hotels.forEach(h => {
            html += `<div class="card">
                <p><strong>Hotel:</strong> ${h.property.name}</p>
                <p><strong>Price:</strong> ${h.property.priceBreakdown.grossPrice.value}</p>
            </div>`;
        });
        div.innerHTML = html;
    } catch (err) {
        div.innerText = "Error: " + err.message;
    }
}
    </script>
</body>
</html>
