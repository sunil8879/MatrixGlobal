<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Stay Matrix - Hotel Search</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    padding: 20px;
    background: #f5f5f5;
}

input, button {
    padding: 10px;
    margin: 5px;
    width: 250px;
}

button {
    cursor: pointer;
    background: turquoise;
    border: none;
    color: white;
    font-weight: bold;
}

.card {
    background: white;
    border-left: 5px solid turquoise;
    margin: 10px auto;
    width: 80%;
    padding: 15px;
    border-radius: 8px;
    text-align: left;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<h1>🏨 Stay Matrix - Hotel Search</h1>

<input type="text" id="city" placeholder="Enter city (e.g. Mumbai)">
<button onclick="searchHotels()">Search</button>

<div id="results"></div>

<script>

const API_KEY = "13ea896566ee41ad87e7d992704b8cf4";

async function searchHotels() {

    const city = document.getElementById("city").value;
    const div = document.getElementById("results");

    if (!city) {
        div.innerHTML = "Please enter a city";
        return;
    }

    div.innerHTML = "Searching hotels...";

    try {

        // Step 1: Get coordinates from city name
        const geoUrl =
        `https://api.geoapify.com/v1/geocode/search?text=${city}&limit=1&apiKey=${API_KEY}`;

        const geoRes = await fetch(geoUrl);
        const geoData = await geoRes.json();

        if (!geoData.features.length) {
            div.innerHTML = "City not found";
            return;
        }

        const lat = geoData.features[0].properties.lat;
        const lon = geoData.features[0].properties.lon;

        // Step 2: Search hotels around location
        const hotelUrl =
        `https://api.geoapify.com/v2/places?categories=accommodation.hotel,accommodation.hostel&filter=circle:${lon},${lat},5000&limit=20&apiKey=${API_KEY}`;

        const hotelRes = await fetch(hotelUrl);
        const hotelData = await hotelRes.json();

        const places = hotelData.features;

        if (!places.length) {
            div.innerHTML = "No hotels found";
            return;
        }

        let html = "<h2>Available Stays</h2>";

        places.forEach(p => {

            const name = p.properties.name || "Unnamed Stay";
            const address = p.properties.formatted || "No address";
            const type = p.properties.categories?.[0] || "Accommodation";

            html += `
                <div class="card">
                    <p><strong>Name:</strong> ${name}</p>
                    <p><strong>Location:</strong> ${address}</p>
                    <p><strong>Type:</strong> ${type}</p>
                    <p><strong>Room Type:</strong> Dorm / Private (varies)</p>
                    <p><strong>Cost:</strong> ₹ -- (not provided by API)</p>
                </div>
            `;
        });

        div.innerHTML = html;

    } catch (err) {
        console.error(err);
        div.innerHTML = "Error fetching hotels";
    }
}

</script>

</body>
</html>
