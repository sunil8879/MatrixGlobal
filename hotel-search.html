<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Stay Search</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; text-align: center; }
        input { padding: 10px; width: 300px; }
        button { padding: 10px 20px; background-color: turquoise; border: 2px solid #333; cursor: pointer; font-weight: bold; }
        #hotelResults { margin-top: 20px; text-align: left; background: #f4f4f4; padding: 15px; border-radius: 8px; }
    </style>
</head>
<body>
    <h1>Stay Search</h1>
    <input type="text" id="hotelInput" placeholder="Enter city name (e.g. London)">
    <button onclick="runHotelSearch()">Search Destinations</button>
    <div id="hotelResults">Results will appear here...</div>

    <script>
        async function runHotelSearch() {
            const city = document.getElementById('hotelInput').value;
            const div = document.getElementById('hotelResults');
            div.innerText = "Searching...";
            
            const HOTEL_KEY = "4d77880947mshfba562934f7f319p16c3fdjsn0d9c236a6a91"; // REPLACE WITH YOUR KEY
            
            try {
                const res = await fetch(`https://booking-com15.p.rapidapi.com/api/v1/hotels/searchDestination?query=${city}`, {
                    headers: { 'X-RapidAPI-Key': HOTEL_KEY, 'X-RapidAPI-Host': 'booking-com15.p.rapidapi.com' }
                });
                const response = await res.json();
                
                let html = "<h3>Destinations Found:</h3><ul>";
                response.data.forEach(item => {
                    html += `<li><strong>${item.name}</strong> - ${item.country} (${item.hotels} hotels)</li>`;
                });
                div.innerHTML = html + "</ul>";
            } catch (err) {
                div.innerText = "Error: Could not find city. Try a major city.";
            }
        }
    </script>
</body>
</html>
