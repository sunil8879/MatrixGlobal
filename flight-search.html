<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flight Search</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    padding: 20px;
}

input, button {
    padding: 10px;
    margin: 5px;
}

.card {
    border: 2px solid #00bcd4;
    margin: 10px auto;
    width: 85%;
    padding: 12px;
    border-radius: 10px;
    text-align: left;
}
</style>
</head>

<body>

<h1>✈️ Flight Details</h1>

<input type="text" id="query" placeholder="Enter city (e.g. New York)">
<input type="date" id="date">
<button onclick="searchFlights()">Search</button>

<div id="results"></div>

<script>

async function searchFlights() {

    const query = document.getElementById("query").value;
    const date = document.getElementById("date").value;
    const div = document.getElementById("results");

    div.innerHTML = "Searching...";

    const url = `https://travel-advisor.p.rapidapi.com/airports/search?query=${query}&locale=en_US`;

    try {

        const response = await fetch(url, {
            method: "GET",
            headers: {
                "X-RapidAPI-Key": "4d77880947mshfba562934f7f319p16c3fdjsn0d9c236a6a91",
                "X-RapidAPI-Host": "travel-advisor.p.rapidapi.com"
            }
        });

        if (!response.ok) throw new Error("API error " + response.status);

        const data = await response.json();

        const flights = data?.data || [];

        if (!flights.length) {
            div.innerHTML = "No data found";
            return;
        }

        let html = "<h2>Flight Results</h2>";

        flights.forEach((f, i) => {

            html += `
            <div class="card">
                <p><strong>Flight Number:</strong> FL-${i + 100}</p>
                <p><strong>Flight Name:</strong> ${f.name || "N/A"}</p>
                <p><strong>Duration:</strong> Not provided by API</p>
                <p><strong>Cost:</strong> $ --- (not in endpoint)</p>
                <p><strong>Destination:</strong> ${query}</p>
                <p><strong>Arrival:</strong> N/A</p>
                <p><strong>Date of Journey:</strong> ${date || "N/A"}</p>
            </div>
            `;
        });

        div.innerHTML = html;

    } catch (err) {
        console.error(err);
        div.innerHTML = "Error fetching flight data.";
    }
}

</script>

</body>
</html>
