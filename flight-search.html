<!DOCTYPE html>
<html>
<head>
    <title>Flight Search</title>
</head>
<body>
    <h1>Flight Search</h1>
    <input type="text" id="depInput" placeholder="Departure ID (e.g. DEL)">
    <input type="text" id="arrInput" placeholder="Arrival ID (e.g. LHR)">
    <button onclick="runFlightSearch()">Search Flights</button>
    
    <div id="flightResults">Results will appear here...</div>

    <script>
        async function runFlightSearch() {
            const dep = document.getElementById('depInput').value;
            const arr = document.getElementById('arrInput').value;
            const div = document.getElementById('flightResults');
            div.innerText = "Searching...";
            
            const KEY = "4d77880947mshfba562934f7f319p16c3fdjsn0d9c236a6a91"; // PUT YOUR KEY HERE
            
            try {
                const response = await fetch(`https://google-flights2.p.rapidapi.com/api/v1/searchFlights?departure_id=${dep}&arrival_id=${arr}&travel_class=ECONOMY&adults=1&currency=USD`, {
                    headers: { 
                        'X-RapidAPI-Key': KEY, 
                        'X-RapidAPI-Host': 'google-flights2.p.rapidapi.com' 
                    }
                });
                const data = await response.json();
                div.innerText = JSON.stringify(data, null, 2);
            } catch (err) {
                div.innerText = "Error: " + err.message;
            }
        }
    </script>
</body>
</html>
