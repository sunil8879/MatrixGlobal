<!DOCTYPE html>
<html>
<body>
    <h1>Flight Airport Search</h1>
    <input type="text" id="flightInput" placeholder="Enter city (e.g. New York)">
    <button onclick="searchFlights()">Search Airports</button>
    <div id="flightResults"></div>

    <script>
        async function searchFlights() {
            const query = document.getElementById('flightInput').value;
            const div = document.getElementById('flightResults');
            div.innerText = "Searching...";
            
            const KEY = "4d77880947mshfba562934f7f319p16c3fdjsn0d9c236a6a91"; // REPLACE WITH YOUR RAPIDAPI KEY
            
            try {
                const res = await fetch(`https://travel-advisor.p.rapidapi.com/airports/search?query=${query}&locale=en_US`, {
                    headers: { 'X-RapidAPI-Key': KEY, 'X-RapidAPI-Host': 'travel-advisor.p.rapidapi.com' }
                });
                const data = await res.json();
                
                let html = "<h3>Airports Found:</h3>";
                // Travel Advisor airport search returns an array directly
                data.forEach(item => {
                    html += `<div style="border:1px solid #ccc; margin:5px; padding:5px;">
                        <strong>Name:</strong> ${item.name} <br>
                        <strong>Code:</strong> ${item.airport_code}
                    </div>`;
                });
                div.innerHTML = html;
            } catch (err) { div.innerText = "Error: " + err.message; }
        }
    </script>
</body>
</html>
