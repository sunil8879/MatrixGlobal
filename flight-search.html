<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flight Search</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; text-align: center; }
        .card { border: 2px solid turquoise; margin: 10px auto; padding: 15px; width: 80%; border-radius: 10px; text-align: left; }
    </style>
</head>
<body>
    <h1>Flight Search</h1>
    <input type="text" id="depInput" placeholder="From (e.g. DEL)">
    <input type="text" id="arrInput" placeholder="To (e.g. LHR)">
    <input type="date" id="dateInput">
    <button onclick="searchFlights(1)">Search Flights</button>
    
    <div id="flightResults"></div>
    <button id="nextBtn" style="display:none;" onclick="loadNext()">Load More Pages</button>

    <script>
        let currentPage = 1;
      async function searchFlights(page) {
    const dep = document.getElementById('depInput').value;
    const arr = document.getElementById('arrInput').value;
    const date = document.getElementById('dateInput').value;
    const div = document.getElementById('flightResults');
    const KEY = "YOUR_GOOGLE_FLIGHTS_KEY";
    
    div.innerText = "Searching...";
    
    try {
        const response = await fetch(`https://google-flights2.p.rapidapi.com/api/v1/searchFlights?departure_id=${dep}&arrival_id=${arr}&outbound_date=${date}&currency=USD`, {
            headers: { 'X-RapidAPI-Key': KEY, 'X-RapidAPI-Host': 'google-flights2.p.rapidapi.com' }
        });
        const json = await response.json();
        
        let html = "<h2>Flights Found:</h2>";
        // Path: json -> data -> itineraries -> topFlights
        json.data.itineraries.topFlights.forEach(f => {
            html += `<div class="card">
                <p><strong>Flight:</strong> ${f.flights[0].airline} (${f.flights[0].flight_number})</p>
                <p><strong>Time:</strong> ${f.departure_time} to ${f.arrival_time}</p>
                <p><strong>Duration:</strong> ${f.duration.text}</p>
                <p><strong>Cost:</strong> $${f.price}</p>
            </div>`;
        });
        div.innerHTML = html;
    } catch (err) { 
        div.innerText = "Error: Check your inputs or API key."; 
    }
}
    </script>
</body>
</html>
